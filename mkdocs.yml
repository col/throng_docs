site_name: Throng Docs
site_description: Documentation for the Throng platform.

site_url: https://docs.throng.dev/
repo_url: https://github.com/col/throng-docs
repo_name: col/throng_docs

theme:
  name: material
  features:
    - navigation.instant       # SPA-like page loads
    - navigation.tracking      # URL updates with active anchor
    - navigation.sections      # top-level nav items render as sections
    - navigation.top           # "back to top" button
    - search.suggest
    - search.highlight
    - content.code.copy        # copy button on code blocks
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition                 # !!! note / warning / tip blocks
  - pymdownx.details           # collapsible admonitions
  - pymdownx.superfences       # nested code/diagram fences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true          # ¶ link beside each heading
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Installation: install.md
  - Docker Compose: docker-compose.md